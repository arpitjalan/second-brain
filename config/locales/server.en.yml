en:
  site_settings:
    second_brain_enabled: "Enable Second Brain — the personal knowledge organizer reskin."
    second_brain_board_topics: "How many topics each homepage board column shows (your recent chats and interesting topics)."
    second_brain_search_results: "How many results the homepage \"search your chats\" box shows."
    second_brain_term_llm_url: "Base URL of your term-llm server, including its base path (e.g. https://brain.example.com/ui). The plugin calls its OpenAI-compatible API server-side."
    second_brain_term_llm_api_key: "Bearer token for the term-llm server (sent server-side only; never exposed to the browser)."
    second_brain_term_llm_model: "Model to request from term-llm. Leave blank to use term-llm's default."
    second_brain_stream_idle_timeout: "Abort a streaming reply after this many seconds with no response from term-llm, freeing the worker. Keep it above the longest your bot can run a single tool silently. Default 300."
    second_brain_forum_actions_enabled: "Tell the bot it can act on this forum (create topics, reply, search). Requires the term-llm `discourse` skill + credentials configured on the term-llm server."
  second_brain:
    thinking: "_Thinking…_"
    empty_reply: "_(no reply)_"
    askuser:
      waiting: "_I need a bit more info to help — please answer below._"
      interrupted: "_⚠️ I lost the connection before I could finish. Ask me again to continue._"
    errors:
      not_configured: "term-llm is not configured. Set the term-llm URL in site settings."
      reply_failed: "Sorry — I couldn't reach term-llm just now. Please try again."
