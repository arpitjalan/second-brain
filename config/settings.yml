plugins:
  second_brain_enabled:
    default: true
    client: true
  # --- term-llm connection (the brain) ---
  second_brain_term_llm_url:
    default: ""
    client: true
  second_brain_term_llm_api_key:
    default: ""
    secret: true
  second_brain_term_llm_model:
    default: ""
  # Abort a streaming reply after this many seconds of total silence from term-llm
  # (no text or tool events), freeing the Sidekiq worker instead of holding it.
  # Keep it above the longest your bot can run a single tool silently.
  second_brain_stream_idle_timeout:
    default: 300
    min: 30
    max: 3600
  # --- chat (PM-backed) ---
  second_brain_bot_username:
    default: "stan"
    client: true
  second_brain_public_category:
    default: ""
    type: category
    client: true
  # How many topics each homepage board column shows (recent chats + interesting).
  second_brain_board_topics:
    default: 5
    min: 1
    max: 50
  # How many results the "Search AI chats" page shows.
  second_brain_search_results:
    default: 8
    min: 1
    max: 50
  # Tell the bot it can act on this forum (needs the term-llm `discourse` skill
  # deployed + credentials configured on the term-llm server). Off until ready.
  second_brain_forum_actions_enabled:
    default: false
